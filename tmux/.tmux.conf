set -g mouse on

set -g default-terminal "tmux-256color"

set -g base-index 1
setw -g pane-base-index 1

set -g history-limit 50000

set -g renumber-windows on

setw -g mode-keys vi

set -g focus-events on

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

set -g status-position bottom
set -g status-style bg=colour237,fg=colour250
set -g status-left "#[fg=colour234,bg=colour75,bold]  #S #[fg=colour75,bg=colour237] "
set -g status-right-length 120
set -g status-right "#[fg=colour75,bg=colour237]#(~/.tmux/status.sh)  #[fg=colour240] #[fg=colour250]%Y-%m-%d %H:%M "
set -g window-status-format "#[fg=colour240,bg=colour237] #I #[fg=colour250] #W "
set -g window-status-current-format "#[fg=colour237,bg=colour208]#[fg=colour234,bg=colour208,bold] #I #W #[fg=colour208,bg=colour237]"
set -g window-status-separator "#[fg=colour240]  "

set -g xterm-keys on

set -g escape-time 10

set -ga terminal-overrides ',*256color*:Tc'
set -ga terminal-overrides ',*:RGB'

set -g status-interval 5

# === 插件系统 ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh nvim node python'

run '~/.tmux/plugins/tpm/tpm'
